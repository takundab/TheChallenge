name: PHP Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l
