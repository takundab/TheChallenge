version: "3.9"

services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: challenge-php
    volumes:
      - .:/var/www

  nginx:
    image: nginx:latest
    container_name: challenge-nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
